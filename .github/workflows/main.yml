name: build jar

on:
  push:
    branches: [ "apparence-build" ]
  pull_request:
    branches: [ "apparence-build" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            javafx_url: "https://download2.gluonhq.com/openjfx/25.0.3/openjfx-25.0.3_linux-x64_bin-sdk.zip"
          - os: macos-latest
            javafx_url: "https://download2.gluonhq.com/openjfx/25.0.3/openjfx-25.0.3_osx-aarch64_bin-sdk.zip"
          - os: windows-latest
            javafx_url: "https://download2.gluonhq.com/openjfx/25.0.3/openjfx-25.0.3_windows-x64_bin-sdk.zip"

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Java JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    # Stage JavaFX for Linux/macOS
    - name: Stage JavaFX to local lib (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        curl -L -o javafx.zip "${{ matrix.javafx_url }}"
        unzip javafx.zip
        mkdir -p lib
        cp -r javafx-sdk-25.0.3/lib/* lib/

    # Stage JavaFX for Windows
    - name: Stage JavaFX to local lib (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        Invoke-WebRequest -Uri "${{ matrix.javafx_url }}" -OutFile javafx.zip
        Expand-Archive -Path javafx.zip -DestinationPath .
        if (!(Test-Path -Path "lib")) { New-Item -ItemType Directory -Path "lib" }
        Copy-Item -Path ".\javafx-sdk-25.0.3\lib\*" -Destination ".\lib\" -Recurse -Force
      shell: pwsh

    # Linux & macOS use your Makefile cleanly
    - name: Compile Project with Make (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: make build

    - name: Package Delivery Bundle (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        mkdir -p dist/app/lib
        cp archidu7.jar dist/app/
        
        cp lib/*.jar dist/app/lib/
        
        # Les natifs doivent être DANS le dossier des jars JavaFX (app/lib) :
        # le NativeLibLoader de JavaFX les y cherche. Les mettre dans app/
        # casse le lancement sous Linux (no suitable pipeline / No toolkit found).
        shopt -s nullglob
        for file in lib/*.dylib lib/*.so; do
          cp "$file" dist/app/lib/
        done
        
        echo '#!/bin/bash' > dist/run.sh
        echo 'cd "$(dirname "$0")/app" || exit' >> dist/run.sh
        echo 'java -jar archidu7.jar' >> dist/run.sh
        chmod +x dist/run.sh

        # L'app démarre sur un environnement vierge (app/modules vide, créé au
        # runtime). On fournit à part un dossier d'exemples que l'utilisateur
        # peut ouvrir via « charger » (sélecteur de dossier de travail).
        mkdir -p dist/exemples/modules
        cp src/modules/*.shdl dist/exemples/modules/
        # Scripts de test (.txt) chargeables depuis la fenêtre de simulation.
        cp modules/*.txt dist/exemples/modules/

    # 2. COMPILE & PACKAGE PROJECT (WINDOWS)
    - name: Compile Project with PowerShell (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        # Recreate Makefile steps natively for Windows shells
        if (!(Test-Path -Path "bin")) { New-Item -ItemType Directory -Path "bin" }
        if (Test-Path -Path "src/assets") { Copy-Item -Path "src/assets" -Destination "bin/assets" -Recurse -Force }
        
        cd src
        javac -d ../bin -cp "../lib/*;." App.java
        cd ..
        
        jar --create --file=archidu7.jar --manifest src/META-INF/MANIFEST.MF -C bin .
      shell: pwsh

    - name: Package Delivery Bundle (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        New-Item -ItemType Directory -Path "dist/app/lib" -Force
        Copy-Item -Path "archidu7.jar" -Destination "dist/app/"
        
        Copy-Item -Path "lib/*.jar" -Destination "dist/app/lib/"
        
        # natifs à côté des jars JavaFX (app/lib), comme Linux/macOS, pour que
        # le NativeLibLoader les trouve quel que soit l'OS
        Copy-Item -Path "lib/*.dll" -Destination "dist/app/lib/" -ErrorAction SilentlyContinue
        
        Set-Content -Path "dist/run.bat" -Value "@echo off`r`ncd /d `"%~dp0\app`"`r`njava -jar archidu7.jar"

        # Dossier d'exemples à part (cf. Linux/macOS) : env de départ vierge,
        # exemples chargeables via « charger ».
        New-Item -ItemType Directory -Path "dist/exemples/modules" -Force
        Copy-Item -Path "src/modules/*.shdl" -Destination "dist/exemples/modules/"
        # Scripts de test (.txt) chargeables depuis la fenêtre de simulation.
        Copy-Item -Path "modules/*.txt" -Destination "dist/exemples/modules/" -ErrorAction SilentlyContinue
      shell: pwsh

    # 3. UPLOAD CLEAN ARTIFACT BUNDLE
    - name: Upload Assignment Bundle
      uses: actions/upload-artifact@v4
      with:
        name: JavaFX-Assignment-${{ matrix.os }}
        path: dist/