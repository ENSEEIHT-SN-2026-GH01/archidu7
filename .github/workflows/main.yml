name: build jar

on:
  push:
    branches: [ "main", "merge-all" ]
  pull_request:
    branches: [ "main", "merge-all" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            javafx_url: "https://download2.gluonhq.com/openjfx/25.0.3/openjfx-25.0.3_linux-x64_bin-sdk.zip"
          - os: macos-latest
            javafx_url: "https://download2.gluonhq.com/openjfx/25.0.3/openjfx-25.0.3_macos-aarch64_bin-sdk.zip"
          - os: windows-latest
            javafx_url: "https://download2.gluonhq.com/openjfx/25.0.3/openjfx-25.0.3_windows-x64_bin-sdk.zip"

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Java JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Install Make (Windows only)
      if: matrix.os == 'windows-latest'
      run: choco install make --no-progress

    # Downloads JavaFX and moves the contents to your local /lib folder (Linux/macOS)
    - name: Stage JavaFX to local lib (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        curl -L -o javafx.zip "${{ matrix.javafx_url }}"
        unzip javafx.zip
        mkdir -p lib
        cp -r javafx-sdk-25.0.3/lib/* lib/

    # Downloads JavaFX and moves the contents to your local /lib folder (Windows)
    - name: Stage JavaFX to local lib (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        Invoke-WebRequest -Uri "${{ matrix.javafx_url }}" -OutFile javafx.zip
        Expand-Archive -Path javafx.zip -DestinationPath .
        if (!(Test-Path -Path "lib")) { New-Item -ItemType Directory -Path "lib" }
        Copy-Item -Path ".\javafx-sdk-25.0.3\lib\*" -Destination ".\lib\" -Recurse -Force
      shell: pwsh

    # Delete unwanted libraries and jar files that would be added to the artifacts
    - name: Compile Project with Make
      run: make build

    - name: Upload Executable JAR
      uses: actions/upload-artifact@v4
      with:
        name: JavaFX-JAR-${{ matrix.os }}
        path: '**/*.jar'
