name: build jar

on:
  push:
    branches: [ "merge-all" ]
  pull_request:
    branches: [ "merge-all" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            javafx_url: "https://download2.gluonhq.com/openjfx/25.0.3/openjfx-25.0.3_linux-x64_bin-sdk.zip"
          - os: macos-latest
            javafx_url: "https://download2.gluonhq.com/openjfx/25.0.3/openjfx-25.0.3_osx-aarch64_bin-sdk.zip"
          - os: windows-latest
            javafx_url: "https://download2.gluonhq.com/openjfx/25.0.3/openjfx-25.0.3_windows-x64_bin-sdk.zip"

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Java JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    # Stage JavaFX for Linux/macOS
    - name: Stage JavaFX to local lib (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        curl -L -o javafx.zip "${{ matrix.javafx_url }}"
        unzip javafx.zip
        mkdir -p lib
        cp -r javafx-sdk-25.0.3/lib/* lib/

    # Stage JavaFX for Windows
    - name: Stage JavaFX to local lib (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        Invoke-WebRequest -Uri "${{ matrix.javafx_url }}" -OutFile javafx.zip
        Expand-Archive -Path javafx.zip -DestinationPath .
        if (!(Test-Path -Path "lib")) { New-Item -ItemType Directory -Path "lib" }
        Copy-Item -Path ".\javafx-sdk-25.0.3\lib\*" -Destination ".\lib\" -Recurse -Force
      shell: pwsh

    # Linux & macOS use your Makefile cleanly
    - name: Compile Project with Make (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: make build

    # Windows bypasses the Makefile and mirrors its steps using PowerShell
    - name: Compile Project with PowerShell (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        # 1. Create bin directory
        if (!(Test-Path -Path "bin")) { New-Item -ItemType Directory -Path "bin" }
        
        # 2. Copy assets over to bin/assets
        if (Test-Path -Path "src/assets") {
            Copy-Item -Path "src/assets" -Destination "bin/assets" -Recurse -Force
        }
        
        # 3. Compile App.java using Windows classpath separators (;) and wildcards (*)
        cd src
        javac -d ../bin -cp "../lib/*;." App.java
        cd ..
        
        # 4. Copy the lib directory into bin (matching your Makefile's setup)
        Copy-Item -Path "lib" -Destination "bin/" -Recurse -Force
        
        # 5. Build the final executable JAR in the root folder using your manifest
        jar --create --file=archidu7.jar --manifest src/META-INF/MANIFEST.MF -C bin .
      shell: pwsh

    # Uploads the root-level archidu7.jar generated by either build path
    - name: Upload Executable JAR
      uses: actions/upload-artifact@v4
      with:
        name: JavaFX-JAR-${{ matrix.os }}
        path: 'archidu7.jar'
